<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contatta IconicWall per progetti residenziali, retail, hospitality e contract.">
  <title>Contatti — IconicWall</title>
  <link rel="stylesheet" href="styles.css?v=26"><script src="script.js?v=43" defer></script>
</head>
<body class="dark-header" data-page="contatti">
  <main>
    <section class="contact-hero">
      <p class="eyebrow reveal">Inizia un progetto</p>
      <h1 class="display reveal">Immaginiamo ciò che<br>la parete può <em>diventare.</em></h1>
      <div class="contact-layout">
        <div class="contact-details reveal">
          <p>Parla direttamente con Iconic</p>
          <a href="mailto:info@iconicoriginal.it">info@iconicoriginal.it</a>
          <a href="tel:+393403549344">+39 340 354 9344</a>
          <p style="margin-top:2rem">Via Guido Rossa, 39<br>35020 Padova, Italia</p>
        </div>
        <form class="contact-form reveal" action="mailto:info@iconicoriginal.it" method="post" enctype="text/plain">
          <div class="field"><label for="name">Nome</label><input id="name" name="Nome" required></div>
          <div class="field"><label for="company">Studio / Azienda</label><input id="company" name="Azienda"></div>
          <div class="field"><label for="email">Email</label><input id="email" name="Email" type="email" required></div>
          <div class="field"><label for="type">Tipo di progetto</label><select id="type" name="Progetto"><option>Living</option><option>Hospitality</option><option>Retail</option><option>Workspace</option><option>Healthcare</option><option>Contract</option></select></div>
          <div class="field full"><label for="message">Raccontaci lo spazio</label><textarea id="message" name="Messaggio"></textarea></div>
          <div class="field full"><button class="button light" type="submit">Invia la richiesta <span>↗</span></button></div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
